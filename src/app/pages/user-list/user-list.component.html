@if (isLoading === true) {
  <section class="users-page users-page--loading container-fluid">
    <div class="users-loading text-center">
      <div class="spinner-border text-primary users-loading__spinner" role="status" aria-hidden="true"></div>
      <p class="users-loading__text mb-0 mt-3">Cargando usuarios...</p>
    </div>
  </section>
}

@if (isLoading === false) {
  <section class="users-page container py-4">

    <div class="users-header card border-0 shadow-sm mb-4">
      <div class="card-body p-3 p-md-4">
        <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3">

          <div>
            <h2 class="users-title mb-1">Listado de usuarios</h2>
            <p class="users-subtitle mb-0 text-muted">
              Página <strong>{{page}}</strong> de <strong>{{total_pages}}</strong>
            </p>
          </div>

          <div class="users-pagination d-flex flex-column flex-sm-row gap-2">
            @if (enablePrevBtn) {
              <button class="btn btn-primary" type="button" (click)="gotoPrev()">
                <span class="me-1">←</span> Página anterior
              </button>
            } @else {
              <button class="btn btn-outline-secondary" type="button" disabled>
                <span class="me-1">←</span> Página anterior
              </button>
            }

            @if (enableNextBtn) {
              <button class="btn btn-primary" type="button" (click)="gotoNext()">
                Siguiente página <span class="ms-1">→</span>
              </button>
            } @else {
              <button class="btn btn-outline-secondary" type="button" disabled>
                Siguiente página <span class="ms-1">→</span>
              </button>
            }
          </div>

        </div>
      </div>
    </div>

    <div class="row g-4 g-xl-5">
      @for (usuario of arrUsuarios; track usuario._id) {
        <article class="col-12 col-md-6 col-xl-4 d-flex">
          <div class="w-100">
            <app-usuario-card [selectedUser]="usuario"></app-usuario-card>
          </div>
        </article>
      }
    </div>

  </section>
}
