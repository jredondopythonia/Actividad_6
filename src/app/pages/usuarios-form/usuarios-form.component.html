<section class="user-form-page container py-4">
  <div class="user-form-card card border-0 overflow-hidden">
    <div class="user-form-card__top"></div>

    <div class="card-body p-4 p-md-5">
      <div class="user-form-header mb-4">
        <span class="user-form-header__pill badge rounded-pill px-3 py-2 mb-3">
          Gestión de usuarios
        </span>

        <h1 class="user-form-title mb-2">Formulario de usuario</h1>

        <p class="user-form-subtitle mb-0">
          Completa la información del usuario y guarda los cambios.
        </p>
      </div>

      <form class="d-flex flex-column gap-4" [formGroup]="userForm" (ngSubmit)="getDataForm()">
        <input type="hidden" formControlName="_id">

        <div class="row g-4">
          <div class="col-12 col-md-6">
            <div class="form-group">
              <label for="first_name" class="form-label user-form-label">Nombre</label>
              <input
                type="text"
                class="form-control form-control-lg user-form-control"
                id="first_name"
                placeholder="Introduce el nombre"
                formControlName="first_name"
              >
            </div>
          </div>

          <div class="col-12 col-md-6">
            <div class="form-group">
              <label for="last_name" class="form-label user-form-label">Apellidos</label>
              <input
                type="text"
                class="form-control form-control-lg user-form-control"
                id="last_name"
                placeholder="Introduce los apellidos"
                formControlName="last_name"
              >
            </div>
          </div>

          <div class="col-12 col-md-6">
            <div class="form-group">
              <label for="username" class="form-label user-form-label">Username</label>
              <input
                type="text"
                class="form-control form-control-lg user-form-control"
                id="username"
                placeholder="Nombre de usuario"
                formControlName="username"
              >
            </div>
          </div>

          <div class="col-12 col-md-6">
            <div class="form-group">
              <label for="email" class="form-label user-form-label">Email</label>
              <input
                type="email"
                class="form-control form-control-lg user-form-control"
                id="email"
                placeholder="correo@ejemplo.com"
                formControlName="email"
              >
            </div>
          </div>

          <div class="col-12 col-md-6">
            <div class="form-group">
              <label for="password" class="form-label user-form-label">Contraseña</label>
              <input
                type="password"
                class="form-control form-control-lg user-form-control"
                id="password"
                placeholder="Introduce la contraseña"
                formControlName="password"
              >
            </div>
          </div>

          <div class="col-12 col-md-6">
            <div class="form-group">
              <label for="image" class="form-label user-form-label">Imagen</label>
              <input
                type="text"
                class="form-control form-control-lg user-form-control"
                id="image"
                placeholder="https://..."
                formControlName="image"
              >
            </div>
          </div>
        </div>

        <div class="user-form-actions pt-2">
          <a class="user-form-btn user-form-btn--secondary" [routerLink]="['/home']">
            Volver
          </a>

          <button type="submit" class="user-form-btn user-form-btn--primary">
            {{title}}
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
